name: merch_mobile
description: Visual merchandising schematic tool for clothing stores.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # PDF generation & export
  pdf: ^3.10.8
  printing: ^5.12.0

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  flutter_colorpicker: ^1.1.0

  # UI
  cupertino_icons: ^1.0.8
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
